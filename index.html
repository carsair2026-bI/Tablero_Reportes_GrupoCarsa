<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tablero Reportes Grupo Carsa</title>
<link rel="icon" type="image/png" href="{{ url_for('static', filename='descarga.png') }}">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>
body {
    background: linear-gradient(135deg, #f5f7fa, #e4e8f0);
    font-family: 'Segoe UI', sans-serif;
}

.dashboard-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
}

.card-btn {
    position: relative;
    padding: 25px;
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.3);
    text-align: center;
    text-decoration: none;
    color: #000;
    transition: all 0.3s ease;
    overflow: hidden;
    animation: fadeInUp 0.6s ease;
    border-left: 6px solid #ff4d4d;
    cursor: pointer;
}

.card-btn i {
    font-size: 40px;
    margin-bottom: 10px;
    display: block;
    color: #000;
}

.card-btn:hover {
    transform: translateY(-8px) scale(1.02);
    box-shadow: 0 20px 50px rgba(0,0,0,0.25);
    background: #ff4d4d;
    color: #fff;
}

.card-btn:hover i {
    color: #fff;
}

.card-btn:active {
    transform: scale(0.97);
}

.card-btn::before {
    content: "";
    position: absolute;
    width: 120%;
    height: 120%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.6), transparent);
    top: -100%;
    left: -100%;
    transition: 0.5s;
}

.card-btn:hover::before {
    top: 100%;
    left: 100%;
}

@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px);}
    to { opacity: 1; transform: translateY(0);}
}

.card {
    border-radius: 20px;
    overflow: hidden;
}

iframe {
    border-radius: 0 0 20px 20px;
}
</style>
</head>

<body>
<div class="container mt-5">

<nav class="navbar px-4 py-2 mb-4" style="background-color: #E51C22; border-radius: 15px;">
    <div class="d-flex align-items-center gap-3">
        <img src="{{ url_for('static', filename='carsa.png') }}" alt="Logo Grupo Carsa" style="max-height: 50px;">
        <span class="text-white fw-bold fs-4">Tablero Reportes Grupo Carsa</span>
    </div>
    <span class="text-white">👋 Bienvenido, {{ usuario }}</span>
</nav>

<div class="dashboard-grid mb-4">
    <div class="card-btn ventas" onclick="window.location.href='{{ url_for('vista_modulo', modulo='ventas') }}'">
        <i class="bi bi-bar-chart-line"></i>
        <h5>Ventas</h5>
        <p>Indicadores comerciales</p>
    </div>

    <div class="card-btn inventario" onclick="window.location.href='{{ url_for('vista_modulo', modulo='inventario') }}'">
        <i class="bi bi-box-seam"></i>
        <h5>Inventario</h5>
        <p>Stock y almacenes</p>
    </div>

    <div class="card-btn logistica" onclick="window.location.href='{{ url_for('vista_modulo', modulo='logistica') }}'">
        <i class="bi bi-truck"></i>
        <h5>Logística</h5>
        <p>Distribución</p>
    </div>

    <div class="card-btn finanzas" onclick="window.location.href='{{ url_for('vista_modulo', modulo='finanzas') }}'">
        <i class="bi bi-cash-stack"></i>
        <h5>Finanzas</h5>
        <p>Ingresos y egresos</p>
    </div>

    <div class="card-btn rrhh" onclick="window.location.href='{{ url_for('vista_modulo', modulo='rrhh') }}'">
        <i class="bi bi-people"></i>
        <h5>RRHH</h5>
        <p>Gestión humana</p>
    </div>

    <div class="card-btn ejecutivo" onclick="window.location.href='{{ url_for('vista_modulo', modulo='ejecutivo') }}'">
        <i class="bi bi-graph-up-arrow"></i>
        <h5>KPI</h5>
        <p>Indicadores clave</p>
    </div>
</div>

<div class="d-flex justify-content-end mt-4">
    <a href="{{ url_for('logout') }}" class="btn btn-danger btn-lg">🚪 Cerrar sesión</a>
</div>

</div>
</body>
</html>
